<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="7" fill="#050810"/>
  <rect width="32" height="32" rx="7" fill="url(#grad)" opacity="0.15"/>
  <rect x="0.5" y="0.5" width="31" height="31" rx="6.5" stroke="url(#grad)" stroke-opacity="0.4"/>
  <!-- I bar top -->
  <rect x="9" y="8" width="14" height="3" rx="1.5" fill="url(#grad)"/>
  <!-- I stem -->
  <rect x="14.5" y="11" width="3" height="10" rx="1.5" fill="url(#grad)"/>
  <!-- I bar bottom -->
  <rect x="9" y="21" width="14" height="3" rx="1.5" fill="url(#grad)"/>
  <!-- accent dot -->
  <circle cx="24" cy="10" r="2" fill="#ffb300" opacity="0.9"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#7c4dff"/>
    </linearGradient>
  </defs>
</svg>
